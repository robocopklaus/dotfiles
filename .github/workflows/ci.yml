name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install validation tools
        run: brew install chezmoi shellcheck shfmt

      - name: Render chezmoi scripts
        run: |
          mkdir -p "$RUNNER_TEMP/chezmoi-rendered-scripts"
          find .chezmoiscripts -type f -name '*.tmpl' -print0 | while IFS= read -r -d '' script; do
            rendered="$RUNNER_TEMP/chezmoi-rendered-scripts/${script#./}"
            rendered="${rendered%.tmpl}"
            mkdir -p "$(dirname "$rendered")"
            chezmoi --source "$PWD" execute-template --file "$script" > "$rendered"
          done

      - name: Validate chezmoi apply
        run: chezmoi --source "$PWD" --destination "$RUNNER_TEMP/chezmoi-dest" apply --dry-run --verbose

      - name: Bash syntax
        run: |
          find "$RUNNER_TEMP/chezmoi-rendered-scripts" -type f -name '*.sh' -print0 | while IFS= read -r -d '' script; do
            bash -n "$script"
          done

      - name: shfmt
        run: shfmt -i 2 -bn -ci -d "$RUNNER_TEMP/chezmoi-rendered-scripts"

      - name: ShellCheck
        run: |
          find "$RUNNER_TEMP/chezmoi-rendered-scripts" -type f -name '*.sh' -print0 | while IFS= read -r -d '' script; do
            shellcheck --severity=style -x "$script"
          done

      - name: Safety prologue
        run: |
          missing=0
          while IFS= read -r -d '' script; do
            if ! head -n 5 "$script" | grep -qE '^set -Eeuo pipefail$'; then
              echo "::error file=$script::missing 'set -Eeuo pipefail' in first 5 lines"
              missing=1
            fi
          done < <(find "$RUNNER_TEMP/chezmoi-rendered-scripts" -type f -name '*.sh' -print0)
          exit "$missing"

      - name: Validate Brewfile
        run: |
          brew bundle list --file Brewfile >/dev/null
          brew bundle list --file Brewfile --formula | while IFS= read -r formula; do
            [[ -n "$formula" ]] && brew info --formula "$formula" >/dev/null
          done
          brew bundle list --file Brewfile --cask | while IFS= read -r cask; do
            [[ -n "$cask" ]] && brew info --cask "$cask" >/dev/null
          done
